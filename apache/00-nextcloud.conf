Listen 443
<VirtualHost *:443>
    DocumentRoot "/var/www/html/nextcloud/"
    ServerName docs.anyit.net

    SSLEngine on
    SSLCertificateFile /etc/httpd/ssl/nextcloud.crt
    SSLCertificateKeyFile /etc/httpd/ssl/nextcloud.key

    <Directory "/var/www/html/nextcloud/">
        Options +FollowSymLinks +MultiViews
        AllowOverride All
        Require all granted
        DirectoryIndex index.php
    </Directory>

    # Proxy OnlyOffice
    ProxyRequests Off
    SSLProxyEngine On
    SSLProxyVerify none
    SSLProxyCheckPeerCN off
    SSLProxyCheckPeerName off
    SSLProxyCheckPeerExpire off

    # Headers for OnlyOffice
    RequestHeader set X-Forwarded-Proto "https"
    ProxyPreserveHost On

    # Proxy Rules
    ProxyPass /onlyoffice-ds/ http://localhost:8080/
    ProxyPassReverse /onlyoffice-ds/ http://localhost:8080/

    # WebSockets Proxy
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/onlyoffice-ds/(.*) "ws://localhost:8080/$1" [P,L]

    # PHP 파일 처리 강제 지정 (PHP-FPM 연결)
    <FilesMatch \.php$>
        SetHandler "proxy:unix:/run/php-fpm/www.sock|fcgi://localhost"
    </FilesMatch>
</VirtualHost>
